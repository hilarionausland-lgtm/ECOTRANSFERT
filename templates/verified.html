<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email confirmé — EcoTransfert</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#F7F4EF;color:#0D0D0D;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border:1px solid #E2DDD6;border-radius:16px;padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.icon{font-size:3.5rem;margin-bottom:1.5rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;margin-bottom:.75rem}
p{color:#6B6560;font-size:.9rem;line-height:1.7;margin-bottom:2rem;font-weight:300}
a{display:inline-flex;align-items:center;padding:.75rem 2rem;background:#B8922A;color:#fff;border-radius:6px;text-decoration:none;font-weight:500;font-size:.9rem;transition:background .2s}
a:hover{background:#9A7A22}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Email confirmé !</h1>
  <p>Votre adresse email a bien été vérifiée. Votre compte EcoTransfert est maintenant actif.</p>
  <a href="/">Se connecter →</a>
</div>
</body>
</html>
